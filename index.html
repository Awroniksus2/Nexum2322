<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexum</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-icon">✦</div>
      <h1 class="logo-text">Nexum</h1>
    </div>
    <p class="tagline">Медичний асистент нового покоління</p>
    <button class="btn" onclick="handleStart()">Почати</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function handleStart() {
      if (tg) {
        tg.showAlert('Nexum запущено! Незабаром тут з\'явиться опитування.');
      } else {
        alert('Nexum запущено!');
      }
    }
  </script>
</body>
</html>
